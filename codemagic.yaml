workflows:
  ios-app-store:
    name: BuscayCurra iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: unified-production
          include: true
          source: true

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: es.buscaycurra.app
      vars:
        BUNDLE_ID: es.buscaycurra.app
        APPLE_TEAM_ID: P9L962T32A
        APP_STORE_CONNECT_ISSUER_ID: "8e2fe663-67af-4d2d-9ad8-5696b6e580c9"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "7MK73YRZ2J"
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Instalar dependencias Node
        script: npm ci

      - name: Crear plataforma iOS
        script: |
          rm -rf ios
          npx cap add ios --packagemanager cocoapods

      - name: Instalar CocoaPods
        script: cd ios/App && pod install

      - name: Sincronizar Capacitor
        script: npx cap sync ios

      - name: Configurar Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true

      - name: Incrementar build number automáticamente
        script: |
          LATEST=$(app-store-connect get-latest-build-number "$BUNDLE_ID" \
            --platform IOS 2>/dev/null || echo "0")
          BUILD=$(($LATEST + 1))
          agvtool new-version -all $BUILD
          echo "Build number: $BUILD"

      - name: Construir IPA para App Store
        script: |
          set -x
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --export-options-plist /Users/builder/export_options.plist \
            --verbose 2>&1 | tee /tmp/build-ipa.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== BUSCANDO ERRORES ==="
          grep -i "error:" /tmp/build-ipa.log || echo "No se encontraron errores explícitos"
          exit $BUILD_EXIT

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: true
