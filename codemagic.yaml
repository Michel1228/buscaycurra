workflows:
  ios-app-store:
    name: BuscayCurra iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: unified-production
          include: true
          source: true
    environment:
      groups:
        - ios-app-store
      ios_signing:
        distribution_type: app_store
        bundle_identifier: es.buscaycurra.app
      vars:
        BUNDLE_ID: es.buscaycurra.app
        APPLE_TEAM_ID: P9L962T32A
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias Node
        script: npm ci
      - name: Crear plataforma iOS
        script: |
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
      - name: Generar iconos nativos iOS
        script: npx @capacitor/assets generate --ios
      - name: Instalar CocoaPods
        script: cd ios/App && pod install
      - name: Sincronizar Capacitor
        script: npx cap sync ios
      - name: Configurar Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'BuscayCurra necesita acceso a tu galería para añadir una foto a tu CV'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'BuscayCurra necesita acceso a tu galería para añadir una foto a tu CV'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'BuscayCurra necesita acceso a tu cámara para hacer una foto para tu CV'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'BuscayCurra necesita acceso a tu cámara para hacer una foto para tu CV'" "$PLIST"
      - name: Incrementar build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Construir IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
