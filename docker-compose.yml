version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: buscaycurra-db
    restart: always
    environment:
      POSTGRES_USER: buscaycurra
      POSTGRES_PASSWORD: ByCurra2026Secure!
      POSTGRES_DB: buscaycurra
    volumes:
      - buscaycurra_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buscaycurra"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: buscaycurra-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://buscaycurra:ByCurra2026Secure!@db:5432/buscaycurra
      JWT_SECRET: ByCurra-JWT-2026-SuperSecretKey!
      GROQ_API_KEY: ${GROQ_API_KEY}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FRONTEND_URL: "*"
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - buscaycurra_uploads:/app/uploads

volumes:
  buscaycurra_pgdata:
  buscaycurra_uploads:
