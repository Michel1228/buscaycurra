name: Build Android AAB (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        run: |
          # Escribir hashes de licencias directamente (más fiable que sdkmanager interactivo)
          mkdir -p $ANDROID_HOME/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" \
            > $ANDROID_HOME/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > $ANDROID_HOME/licenses/android-sdk-preview-license
          printf "33b6937b8ce6b6f5a4a5ad3f1f9a5a7e3a7f8b6\n" \
            > $ANDROID_HOME/licenses/android-googletv-license

          # Instalar platform-tools (obligatorio para bubblewrap)
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" 2>&1 | tail -3

          # Diagnóstico del SDK
          echo "=== SDK structure ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls $ANDROID_HOME/
          ls $ANDROID_HOME/build-tools/ 2>/dev/null && echo "✅ build-tools OK" || echo "❌ build-tools MISSING"
          ls $ANDROID_HOME/platform-tools/ 2>/dev/null && echo "✅ platform-tools OK" || echo "❌ platform-tools MISSING"
          ls $ANDROID_HOME/licenses/ && echo "✅ licenses OK"

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" \
            > ~/.bubblewrap/config.json
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/android.keystore
            echo "source=secret" >> $GITHUB_OUTPUT
            echo "✅ Keystore restaurado desde secret"
          else
            keytool -genkeypair -v \
              -keystore /tmp/android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=BuscayCurra,O=BuscayCurra,C=ES" \
              -noprompt
            echo "source=new" >> $GITHUB_OUTPUT
            echo "✅ Keystore nuevo generado"
          fi

      - name: Start local asset server
        run: |
          python3 -m http.server 9090 --directory $GITHUB_WORKSPACE/public &
          sleep 2
          curl -sf http://localhost:9090/manifest.json -o /dev/null && echo "✅ manifest OK" || echo "❌ manifest FALLA"
          curl -sf http://localhost:9090/icon-512.png -o /dev/null && echo "✅ icon-512 OK" || echo "❌ icon-512 FALLA"
          curl -sf http://localhost:9090/icon-512-maskable.png -o /dev/null && echo "✅ icon-512-maskable OK" || echo "❌ icon-512-maskable FALLA"

      - name: Prepare build directory
        run: |
          mkdir -p /tmp/twa-build
          # Inyectar keystore + redirigir iconos al servidor local (evita conectar al VPS)
          jq \
            --arg kpath "/tmp/android.keystore" \
            '.signingKey.path = $kpath
             | .signingKey.storePassword = "android"
             | .signingKey.keyPassword = "android"
             | .iconUrl = "http://localhost:9090/icon-512.png"
             | .maskableIconUrl = "http://localhost:9090/icon-512-maskable.png"' \
            twa-manifest.json > /tmp/twa-build/twa-manifest.json
          echo "twa-manifest.json listo:"
          cat /tmp/twa-build/twa-manifest.json

      - name: Build AAB
        working-directory: /tmp/twa-build
        run: bubblewrap build --skipPwaValidation

      - name: Locate AAB
        id: find_aab
        run: |
          AAB=$(find /tmp/twa-build -name "*.aab" 2>/dev/null | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT
          if [ -n "$AAB" ]; then
            echo "✅ AAB encontrado: $AAB"
            ls -lh "$AAB"
          else
            echo "❌ AAB no encontrado, listando directorio:"
            find /tmp/twa-build -type f | head -40
            exit 1
          fi

      - name: Get SHA-256 fingerprint
        run: |
          SHA=$(keytool -list -v \
            -keystore /tmp/android.keystore \
            -alias android \
            -storepass android 2>/dev/null | grep "SHA256:" | awk '{print $2}')
          echo ""
          echo "========================================================"
          echo "  SHA-256 FINGERPRINT (para assetlinks.json):"
          echo "  $SHA"
          echo "========================================================"

      - name: Show KEYSTORE_BASE64 for secret (primera ejecución)
        if: steps.keystore.outputs.source == 'new'
        run: |
          echo ""
          echo "========================================================"
          echo "  PRIMERA EJECUCIÓN — Guarda este keystore como secret"
          echo "  Nombre del secret: KEYSTORE_BASE64"
          echo "  Valor (copia todo):"
          base64 -w 0 /tmp/android.keystore
          echo ""
          echo "========================================================"

      - name: Copy artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp /tmp/android.keystore /tmp/artifacts/android.keystore
          AAB="${{ steps.find_aab.outputs.path }}"
          cp "$AAB" /tmp/artifacts/buscaycurra-release.aab
          echo "Artifacts:"
          ls -lh /tmp/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-v${{ github.run_number }}
          path: /tmp/artifacts/
          retention-days: 90
