name: Build Android AAB (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Accept Android SDK licenses + instalar plataforma
        run: |
          mkdir -p $ANDROID_HOME/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > $ANDROID_HOME/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > $ANDROID_HOME/licenses/android-sdk-preview-license
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3

      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/android.keystore
            echo "source=secret" >> $GITHUB_OUTPUT
            echo "Keystore restaurado desde secret"
          else
            keytool -genkeypair -v \
              -keystore /tmp/android.keystore \
              -alias android \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=BuscayCurra,O=BuscayCurra,C=ES" \
              -noprompt
            echo "source=new" >> $GITHUB_OUTPUT
            echo "Keystore nuevo generado"
          fi

      - name: Copy icons to Android project
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$dir
            cp public/icon-192.png android/app/src/main/res/$dir/ic_launcher.png
          done
          echo "Icons copiados"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build AAB
        working-directory: android
        env:
          KEYSTORE_PATH: /tmp/android.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: android
          KEY_PASSWORD: android
        run: gradle bundleRelease

      - name: Get SHA-256 fingerprint
        run: |
          SHA=$(keytool -list -v -keystore /tmp/android.keystore -alias android \
            -storepass android 2>/dev/null | grep "SHA256:" | awk '{print $2}')
          echo ""
          echo "========================================================"
          echo "  SHA-256 (para assetlinks.json): $SHA"
          echo "========================================================"

      - name: Show KEYSTORE_BASE64 (primera ejecucion)
        if: steps.keystore.outputs.source == 'new'
        run: |
          echo "========================================================"
          echo "  Guarda esto como secret KEYSTORE_BASE64:"
          base64 -w 0 /tmp/android.keystore
          echo ""
          echo "========================================================"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-v${{ github.run_number }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            /tmp/android.keystore
          retention-days: 90
