name: API Health Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check API health endpoint
        id: health
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "https://buscaycurra.es/api/admin/health?secret=${{ secrets.ADMIN_SECRET }}")
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          cat /tmp/response.json

      - name: Parse health response
        id: parse
        run: |
          OK=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('ok','false')).lower())")
          TOTAL_JOBS=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('db',{}).get('totalJobs','?'))")
          echo "ok=$OK" >> $GITHUB_OUTPUT
          echo "totalJobs=$TOTAL_JOBS" >> $GITHUB_OUTPUT

      - name: Open GitHub issue if system is down
        if: steps.health.outputs.status != '200' || steps.parse.outputs.ok != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = require('fs').readFileSync('/tmp/response.json', 'utf8');
            const now = new Date().toISOString();
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-down',
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Seguimiento â€” ${now}\n\`\`\`json\n${response}\n\`\`\``,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `ALERTA: Sistema degradado â€” ${now}`,
                body: `## Sistema detectado como degradado\n\n**Timestamp:** ${now}\n**HTTP Status:** ${{ steps.health.outputs.status }}\n\n### Respuesta:\n\`\`\`json\n${response}\n\`\`\``,
                labels: ['api-down'],
              });
            }

      - name: Close issue if system recovered
        if: steps.health.outputs.status == '200' && steps.parse.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'api-down',
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Sistema recuperado âś… â€” ${new Date().toISOString()}\nTotal ofertas: ${{ steps.parse.outputs.totalJobs }}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Report status
        run: |
          echo "Health check completado"
          echo "HTTP Status: ${{ steps.health.outputs.status }}"
          echo "OK: ${{ steps.parse.outputs.ok }}"
          echo "Total jobs: ${{ steps.parse.outputs.totalJobs }}"
