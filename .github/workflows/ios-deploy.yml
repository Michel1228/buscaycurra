name: Build & Deploy iOS to App Store

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 24 (Capacitor requires >=22)
        run: |
          curl -fsSL https://nodejs.org/dist/v24.0.0/node-v24.0.0-darwin-arm64.tar.gz -o /tmp/node24.tar.gz
          sudo tar -xzf /tmp/node24.tar.gz -C /usr/local --strip-components=1
          node --version
          npm --version

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup iOS platform (generate Podfile if missing)
        run: |
          if [ ! -f ios/App/Podfile ]; then
            npx cap add ios
          fi
          echo "Podfile exists: $(ls -la ios/App/Podfile)"

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Generate App Store icon 1024x1024
        run: cp public/icon-1024.png ios/App/App/Assets.xcassets/AppIcon.appiconset/Icon-1024.png 2>/dev/null || sips -z 1024 1024 public/icon-512.png --out ios/App/App/Assets.xcassets/AppIcon.appiconset/Icon-1024.png

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          # Crear Podfile si no fue generado por cap add ios
          if [ ! -f Podfile ]; then
            cat > Podfile << 'PODFILE'
          platform :ios, '13.0'
          
          def capacitor_pods
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorApp', :path => '../../node_modules/@capacitor/app'
            pod 'CapacitorCamera', :path => '../../node_modules/@capacitor/camera'
            pod 'CapacitorPreferences', :path => '../../node_modules/@capacitor/preferences'
            pod 'CapacitorPushNotifications', :path => '../../node_modules/@capacitor/push-notifications'
          end
          
          target 'App' do
            capacitor_pods
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          PODFILE
            echo "Podfile creado manualmente"
          fi
          pod install --repo-update

      - name: Build and upload with Fastlane
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: bundle exec fastlane ios deploy
