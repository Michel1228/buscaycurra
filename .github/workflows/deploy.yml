name: Deploy to VPS via Easypanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Easypanel build from GitHub source
        run: |
          TOKEN=$(curl -sf -X POST "http://187.124.37.183:3000/api/trpc/auth.login" \
            -H "Content-Type: application/json" \
            -d '{"json":{"email":"michelbatistagonzalez1992@gmail.com","password":"iBihfBfw3xdNAdD"}}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['data']['json']['token'])")

          # Ensure build is configured as Dockerfile
          curl -sf -X POST "http://187.124.37.183:3000/api/trpc/services.app.updateBuild" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"json":{"projectName":"buscaycurra","serviceName":"nextjs","build":{"type":"dockerfile","file":"Dockerfile"}}}'

          # Trigger the build and deploy
          curl -sf -X POST "http://187.124.37.183:3000/api/trpc/services.app.deployService" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"json":{"projectName":"buscaycurra","serviceName":"nextjs"}}' \
            && echo "Deploy triggered" || echo "Warning: deploy failed"
