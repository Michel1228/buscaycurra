name: Build & Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io/michel1228/buscaycurra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}:latest
            ${{ env.REGISTRY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ojesordjedovnpyxspxi.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=BMwO_UwxsPVgcPaWvF8sqGJS9I7i5OK-TUizvV0didBz5oNLLtScZhwC2aEwPSjqLVXChI8ISuIcufzA9yF4QCA

      - name: Deploy to Easypanel with SHA tag
        run: |
          echo "== Login Easypanel =="
          LOGIN_RESP=$(curl -s --connect-timeout 15 --max-time 30 -X POST "http://187.124.37.183:3000/api/trpc/auth.login" \
            -H "Content-Type: application/json" \
            -d '{"json":{"email":"michelbatistagonzalez1992@gmail.com","password":"iBihfBfw3xdNAdD"}}')
          echo "Login response: $LOGIN_RESP"

          TOKEN=$(echo "$LOGIN_RESP" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).result.data.json.token)}catch(e){console.error('Parse error:',e.message,d);process.exit(1)}})")

          if [ -z "$TOKEN" ]; then
            echo "ERROR: no se pudo obtener token de Easypanel"
            exit 1
          fi
          echo "Token obtenido OK"

          echo "== Actualizando imagen =="
          curl -s --connect-timeout 15 --max-time 30 -X POST "http://187.124.37.183:3000/api/trpc/services.app.updateSourceImage" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{\"json\":{\"projectName\":\"buscaycurra\",\"serviceName\":\"nextjs\",\"image\":\"${{ env.REGISTRY }}:${{ github.sha }}\",\"username\":\"${{ github.actor }}\",\"password\":\"${{ secrets.GITHUB_TOKEN }}\"}}"

          echo "== Desplegando =="
          curl -s --connect-timeout 15 --max-time 30 -X POST "http://187.124.37.183:3000/api/trpc/services.app.deployService" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"json":{"projectName":"buscaycurra","serviceName":"nextjs"}}' \
            && echo "Deploy triggered OK" || echo "Warning: deploy call failed"
