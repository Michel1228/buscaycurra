name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://187.124.37.183:3000/api/deploy/c7c99010e8adb8f3e060fded0b83e8392519d1f5c5ec0931")
          echo "Deploy webhook status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "204" ]; then
            echo "Deploy triggered successfully"
          else
            echo "Warning: unexpected status $STATUS"
          fi
