name: Build & Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io/michel1228/buscaycurra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}:latest
            ${{ env.REGISTRY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ojesordjedovnpyxspxi.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=BMwO_UwxsPVgcPaWvF8sqGJS9I7i5OK-TUizvV0didBz5oNLLtScZhwC2aEwPSjqLVXChI8ISuIcufzA9yF4QCA

      - name: Deploy to Easypanel via webhook
        run: |
          echo "== Triggering Easypanel deploy webhook =="
          RESP=$(curl -s --connect-timeout 20 --max-time 40 -X POST \
            "http://187.124.37.183:3000/api/deploy/c7c99010e8adb8f3e060fded0b83e8392519d1f5c5ec0931" \
            -H "Content-Type: application/json" || echo "curl_failed")
          echo "Webhook response: $RESP"
          if [ "$RESP" = "curl_failed" ]; then
            echo "Warning: Easypanel webhook not reachable — image is in GHCR, deploy manually if needed"
          else
            echo "Deploy triggered OK"
          fi
