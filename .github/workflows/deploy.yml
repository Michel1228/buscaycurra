name: Build & Deploy to VPS

on:
  push:
    branches: [unified-production, main]

env:
  REGISTRY: ghcr.io/michel1228/buscaycurra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}:latest
            ${{ env.REGISTRY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ojesordjedovnpyxspxi.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.124.37.183
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            # Pull latest image from GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.REGISTRY }}:latest

            # Stop and remove old container
            docker stop buscaycurra-nextjs 2>/dev/null || true
            docker rm   buscaycurra-nextjs 2>/dev/null || true

            # Start new container with all env vars
            docker run -d \
              --name buscaycurra-nextjs \
              --network busca-y-curra_default \
              -p 8892:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e REDIS_URL=redis://buscaycurra-redis:6379 \
              -e ADMIN_SECRET=${{ secrets.ADMIN_SECRET }} \
              -e SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              -e STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
              -e STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
              -e STRIPE_PRICE_ESENCIAL=${{ secrets.STRIPE_PRICE_ESENCIAL }} \
              -e STRIPE_PRICE_BASICO=${{ secrets.STRIPE_PRICE_BASICO }} \
              -e STRIPE_PRICE_PRO=${{ secrets.STRIPE_PRICE_PRO }} \
              -e STRIPE_PRICE_EMPRESA=${{ secrets.STRIPE_PRICE_EMPRESA }} \
              -e RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
              -e JOOBLE_API_KEY=${{ secrets.JOOBLE_API_KEY }} \
              -e CAREERJET_API_KEY=${{ secrets.CAREERJET_API_KEY }} \
              -e ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }} \
              -e ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }} \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -e FROM_EMAIL=noreply@buscaycurra.es \
              ${{ env.REGISTRY }}:latest

            # Wait and verify
            sleep 8
            STATUS=$(docker inspect buscaycurra-nextjs --format='{{.State.Status}}' 2>/dev/null)
            if [ "$STATUS" != "running" ]; then
              echo "ERROR: Container not running after deploy"
              docker logs buscaycurra-nextjs --tail 20
              exit 1
            fi
            echo "Deploy OK — container status: $STATUS"
