name: Build & Deploy to VPS

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/michel1228/buscaycurra:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify npm build works outside Docker
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ojesordjedovnpyxspxi.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ''
        run: |
          npm ci
          npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="https://ojesordjedovnpyxspxi.supabase.co" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN" \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="" \
            -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Trigger Easypanel deploy
        run: |
          curl -s -X POST \
            "http://187.124.37.183:3000/api/deploy/c7c99010e8adb8f3e060fded0b83e8392519d1f5c5ec0931" \
            || true
