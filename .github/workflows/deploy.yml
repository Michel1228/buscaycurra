name: Build & Deploy to VPS

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/michel1228/buscaycurra:latest
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ojesordjedovnpyxspxi.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_YCsE2bdWgmtR8U9AvmfRCA_n09gvZyN
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image from pre-built artifacts
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Trigger Easypanel deploy
        run: |
          curl -sf -X POST \
            "http://187.124.37.183:3000/api/deploy/c7c99010e8adb8f3e060fded0b83e8392519d1f5c5ec0931" \
            && echo "Deploy triggered" || echo "Warning: deploy webhook failed (app may still deploy)"
