name: Sync Job Listings

on:
  schedule:
    # Cada 2 horas, lunes a viernes
    - cron: '0 */2 * * 1-5'
    # Sábados y domingos cada 4 horas
    - cron: '0 */4 * * 0,6'
  workflow_dispatch:
    inputs:
      country:
        description: 'País (es/uk/us/de/fr/au)'
        default: 'uk'
        required: false
      batchSize:
        description: 'Combos por ronda'
        default: '30'
        required: false

jobs:
  sync-adzuna:
    name: "Adzuna ${{ inputs.country || 'rotativo' }} — ${{ inputs.batchSize || 30 }} combos"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { country: 'uk', batchSize: 30 }
          - { country: 'us', batchSize: 30 }
          - { country: 'de', batchSize: 30 }
          - { country: 'fr', batchSize: 30 }
          - { country: 'es', batchSize: 30 }
          - { country: 'au', batchSize: 30 }
    steps:
      - name: Sync Adzuna country
        run: |
          COUNTRY="${{ inputs.country || matrix.country }}"
          BATCH="${{ inputs.batchSize || matrix.batchSize }}"
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-adzuna-global" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"country\":\"${COUNTRY}\",\"batchSize\":${BATCH}}" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "${COUNTRY}: HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
