name: Sync Job Listings — Adzuna + Careerjet Global

on:
  schedule:
    - cron: '0 */2 * * 1-5'
    - cron: '0 */4 * * 0,6'
  workflow_dispatch:
    inputs:
      country:
        description: 'País Adzuna'
        required: false
      batchSize:
        description: 'Combos por país'
        default: '15'
        required: false

jobs:
  sync-adzuna:
    name: "Adzuna ${{ matrix.country }} × ${{ matrix.batch }} c"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { country: uk, batch: 15 }
          - { country: uk, batch: 15 }
          - { country: us, batch: 15 }
          - { country: us, batch: 15 }
          - { country: de, batch: 15 }
          - { country: de, batch: 15 }
          - { country: fr, batch: 15 }
          - { country: fr, batch: 15 }
          - { country: au, batch: 15 }
          - { country: au, batch: 15 }
          - { country: es, batch: 15 }
          - { country: es, batch: 15 }
    steps:
      - name: Sync Adzuna ${{ matrix.country }}
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-adzuna-global" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"country\":\"${{ matrix.country }}\",\"batchSize\":${{ matrix.batch }}" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "${{ matrix.country }}: HTTP $HTTP_CODE — $BODY"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || exit 1

  sync-careerjet:
    name: "Careerjet ${{ matrix.country }} × ${{ matrix.batch }} c"
    runs-on: ubuntu-latest
    needs: sync-adzuna
    strategy:
      fail-fast: false
      matrix:
        include:
          # English countries — keywords funcionan bien
          - { country: us, batch: 10 }
          - { country: uk, batch: 10 }
          - { country: au, batch: 10 }
          - { country: ca, batch: 10 }
          # European — keywords nativas
          - { country: de, batch: 10 }
          - { country: fr, batch: 10 }
          - { country: nl, batch: 10 }
          - { country: it, batch: 10 }
          - { country: es, batch: 10 }
          - { country: se, batch: 10 }
          - { country: ch, batch: 10 }
          - { country: be, batch: 10 }
          - { country: pt, batch: 10 }
          - { country: ie, batch: 10 }
          - { country: no, batch: 10 }
          - { country: dk, batch: 10 }
          - { country: at, batch: 10 }
          - { country: fi, batch: 10 }
          - { country: nz, batch: 10 }
          - { country: pl, batch: 10 }
    steps:
      - name: Sync Careerjet ${{ matrix.country }}
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-careerjet-global" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"country\":\"${{ matrix.country }}\",\"batchSize\":${{ matrix.batch }}" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "${{ matrix.country }}: HTTP $HTTP_CODE — $BODY"
          [ "$HTTP_CODE" = "200" ] || exit 1
