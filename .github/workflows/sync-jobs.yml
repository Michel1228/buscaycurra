name: Sync Job Listings

on:
  schedule:
    # Cada 2 horas, lunes a viernes
    - cron: '0 */2 * * 1-5'
    # Sábados y domingos cada 4 horas (menos actividad laboral)
    - cron: '0 */4 * * 0,6'
  workflow_dispatch:
    inputs:
      source:
        description: 'Fuente (jooble/careerjet)'
        default: 'jooble'
        required: false
      offset:
        description: 'Offset de inicio (0 = desde el principio)'
        default: '0'
        required: false

jobs:
  sync-jooble:
    name: "Jooble — offset ${{ matrix.offset }}, p${{ matrix.page }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { offset: 0,    page: 1 }
          - { offset: 40,   page: 1 }
          - { offset: 80,   page: 1 }
          - { offset: 120,  page: 1 }
          - { offset: 160,  page: 1 }
          - { offset: 200,  page: 1 }
          - { offset: 0,    page: 2 }
          - { offset: 80,   page: 2 }
    steps:
      - name: Sync batch
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-run" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"jooble\",\"batchSize\":40,\"offset\":${{ matrix.offset }},\"page\":${{ matrix.page }}}" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

  sync-careerjet:
    name: "Careerjet — offset ${{ matrix.offset }}"
    runs-on: ubuntu-latest
    # Careerjet solo en la mitad de los ciclos para no saturar
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 */4')) }}
    strategy:
      fail-fast: false
      matrix:
        offset: [0, 40, 80, 120]
    steps:
      - name: Sync batch
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-run" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"careerjet\",\"batchSize\":40,\"offset\":${{ matrix.offset }},\"page\":1}" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
