name: Sync Job Listings — Adzuna Multi-País

on:
  schedule:
    # Cada 2 horas, lunes a viernes — Adzuna (250 req/día gratis por país)
    - cron: '0 */2 * * 1-5'
    # Sábados y domingos cada 4 horas
    - cron: '0 */4 * * 0,6'
  workflow_dispatch:
    inputs:
      country:
        description: 'País (uk/us/de/fr/au/es)'
        required: false
      batchSize:
        description: 'Combos por país'
        default: '15'
        required: false

jobs:
  sync-adzuna:
    name: "Adzuna ${{ matrix.country }} × ${{ matrix.batch }} combos"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 3 rondas por país para rotar keywords y no saturar rate-limit
          - { country: uk, batch: 15 }
          - { country: uk, batch: 15 }
          - { country: us, batch: 15 }
          - { country: us, batch: 15 }
          - { country: de, batch: 15 }
          - { country: de, batch: 15 }
          - { country: fr, batch: 15 }
          - { country: fr, batch: 15 }
          - { country: au, batch: 15 }
          - { country: au, batch: 15 }
          - { country: es, batch: 15 }
          - { country: es, batch: 15 }
    steps:
      - name: Sync Adzuna ${{ matrix.country }}
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-adzuna-global" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"country\":\"${{ matrix.country }}\",\"batchSize\":${{ matrix.batch }}" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "${{ matrix.country }}: HTTP $HTTP_CODE — $BODY"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || exit 1

  sync-careerjet-global:
    name: "Careerjet multi-país"
    runs-on: ubuntu-latest
    needs: sync-adzuna
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        country: [us, uk, au, ca]
        batch: [10]
    steps:
      - name: Sync Careerjet ${{ matrix.country }}
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-careerjet-global" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"country\":\"${{ matrix.country }}\",\"batchSize\":${{ matrix.batch }}" \
            --max-time 120)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "Careerjet ${{ matrix.country }}: HTTP $HTTP_CODE — $BODY"
          [ "$HTTP_CODE" = "200" ] || exit 1
