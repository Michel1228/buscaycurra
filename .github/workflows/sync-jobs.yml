name: Sync Job Listings

on:
  schedule:
    # Cada 2 horas, lunes a viernes
    - cron: '0 */2 * * 1-5'
    # Sábados y domingos cada 4 horas
    - cron: '0 */4 * * 0,6'
  workflow_dispatch:
    inputs:
      source:
        description: 'Fuente (careerjet/adzuna)'
        default: 'careerjet'
        required: false
      offset:
        description: 'Offset de inicio'
        default: '0'
        required: false

jobs:
  sync-careerjet:
    name: "Careerjet — offset ${{ matrix.offset }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        offset: [0, 40, 80, 120, 160, 200, 240, 280]
    steps:
      - name: Sync batch
        run: |
          RESULT=$(curl -s -w "\n%{http_code}" -X POST "https://buscaycurra.es/api/jobs/sync-run" \
            -H "x-sync-secret: ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"careerjet\",\"batchSize\":40,\"offset\":${{ matrix.offset }},\"page\":1}" \
            --max-time 90)
          HTTP_CODE=$(echo "$RESULT" | tail -1)
          BODY=$(echo "$RESULT" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
